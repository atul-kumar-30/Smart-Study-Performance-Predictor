<!DOCTYPE html>
<html>
<head>
    <title>Study Score Predictor</title>
</head>
<body>
    <h2>Smart Study Performance Predictor</h2>

    <form action="/predict" method="post">
        <label>Enter Study Hours:</label><br><br>
        <input type="number" step="0.1" name="hours" required><br><br>

        <button type="submit">Predict Score</button>
    </form>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}
</body>
</html>
